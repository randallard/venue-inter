version: 1
metadata:
  name: venueinter-oauth2-provider
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # ── Groups scope mapping ───────────────────────────────
  - model: authentik_providers_oauth2.scopemapping
    id: groups-scope
    state: present
    identifiers:
      scope_name: groups
    attrs:
      name: "groups"
      scope_name: groups
      description: "User group memberships"
      expression: |
        return [group.name for group in request.user.ak_groups.all()]

  # ── OAuth2 / OIDC Provider ──────────────────────────────
  - model: authentik_providers_oauth2.oauth2provider
    id: venueinter-provider
    state: present
    identifiers:
      name: venueinter
    attrs:
      name: venueinter
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: !Env [OIDC_CLIENT_ID, venueinter-dev-client-id]
      client_secret: !Env [OIDC_CLIENT_SECRET, venueinter-dev-client-secret]
      redirect_uris:
        - url: "http://localhost:8080/auth/callback"
          matching_mode: strict
      access_code_validity: "minutes=10"
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      issuer_mode: per_provider
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf groups-scope

  # ── Application ──────────────────────────────────────────
  - model: authentik_core.application
    id: venueinter-application
    state: present
    identifiers:
      slug: venueinter
    attrs:
      name: VenueInter
      slug: venueinter
      provider: !KeyOf venueinter-provider
      policy_engine_mode: any

  # ── Groups ──────────────────────────────────────────────
  - model: authentik_core.group
    id: helpdesk-group
    state: present
    identifiers:
      name: helpdesk
    attrs:
      name: helpdesk

  - model: authentik_core.group
    id: users-group
    state: present
    identifiers:
      name: users
    attrs:
      name: users

  # ── CEO review group (narrow review queue access) ────────
  - model: authentik_core.group
    id: ceo-review-group
    state: present
    identifiers:
      name: ceo-review
    attrs:
      name: ceo-review

  # ── Dev user (full access) ───────────────────────────────
  - model: authentik_core.user
    id: devuser
    state: present
    identifiers:
      username: devuser
    attrs:
      name: Dev User
      email: devuser@localhost
      path: users
      is_active: true
      password: dev-password
      groups:
        - !KeyOf helpdesk-group
        - !KeyOf users-group

  # ── CEO dev user (narrow review-only access) ─────────────
  - model: authentik_core.user
    id: ceouser
    state: present
    identifiers:
      username: ceouser
    attrs:
      name: CEO User
      email: ceouser@localhost
      path: users
      is_active: true
      password: dev-password
      groups:
        - !KeyOf users-group
        - !KeyOf ceo-review-group
